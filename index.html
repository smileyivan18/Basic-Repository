<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Ivan Milan Streaming</title>

<style>

body{
    margin:0;
    font-family: Arial, Helvetica, sans-serif;
    background-color:#0f172a;
    color:white;
}

header{
    display:flex;
    justify-content:space-between;
    align-items:center;
    padding:20px 40px;
    background:#020617;
}

.logo{
    font-size:28px;
    font-weight:bold;
    color:#38bdf8;
}

nav a{
    margin-left:20px;
    text-decoration:none;
    color:white;
    font-weight:500;
}

nav a:hover{
    color:#38bdf8;
}

.hero{
    height:80vh;
    display:flex;
    justify-content:center;
    align-items:center;
    text-align:center;
    background:linear-gradient(rgba(0,0,0,.6),rgba(0,0,0,.6)),
    url("stream-banner.svg");
    background-size:cover;
    background-position:center;
}

.hero h1{
    font-size:60px;
    margin-bottom:10px;
}

.hero p{
    font-size:22px;
}

.btn{
    margin-top:20px;
    padding:12px 30px;
    background:#38bdf8;
    border:none;
    font-size:18px;
    border-radius:6px;
    cursor:pointer;
}

.btn:hover{
    background:#0ea5e9;
}

.section{
    padding:80px 10%;
    text-align:center;
}

.stream-box{
    background:#020617;
    padding:40px;
    border-radius:10px;
}

footer{
    padding:30px;
    text-align:center;
    background:#020617;
    margin-top:40px;
}

</style>
</head>

<body>

<header>

<div class="logo">Ivan Milan</div>

<nav>
<a href="#">Home</a>
<a href="#stream">Stream</a>
<a href="#about">About</a>
</nav>

</header>

<section class="hero">

<div>

<h1>Ivan Milan Streaming</h1>
<p>Gaming • Tech • Live Content</p>

<button class="btn">Watch Live</button>

</div>

</section>

<section id="stream" class="section">

<h2>Live Stream</h2>

<div class="stream-box">

<p>Live stream will appear here.</p>

<!-- Twitch or YouTube embed example -->

<iframe
width="700"
height="400"
src="https://www.youtube.com/@smileyivan5900"
frameborder="0"
allowfullscreen>
</iframe>

</div>

</section>

<section id="about" class="section">

<h2>About the Stream</h2>

<p>
Welcome to Ivan Milan Streaming.  
This channel features gaming, technology discussions, and live content.
</p>

</section>

<footer>

<p>© 2026 Ivan Milan Streaming</p>

</footer>

</body>
</html>
